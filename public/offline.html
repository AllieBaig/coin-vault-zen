<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>CoinVault — Offline</title>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; height: 100%; background: #FFFFFF; color: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { max-width: 360px; text-align: center; }
      h1 { font-size: 20px; margin: 16px 0 8px; }
      p { color: #666; font-size: 14px; line-height: 1.5; margin: 0 0 16px; }
      button { background: #111; color: #fff; border: 0; border-radius: 12px; padding: 10px 18px; font-size: 14px; }
      img { width: 72px; height: 72px; border-radius: 16px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <img src="./icon-192.png" alt="CoinVault" width="72" height="72" />
        <h1>You're offline</h1>
        <p>CoinVault works offline. Reconnect to sync, or retry to load cached data.</p>
        <button onclick="location.reload()">Retry</button>
      </div>
    </div>
  </body>
</html>
